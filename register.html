<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="icon" type="image/png" href="punisher.png">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 110vh;
            margin: 0;
            background-image: url("spiders.jpg");
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            transition: background-color 0.3s, background-image 0.3s;
        }
        .container {
            width: 300px;
            padding: 20px;
            border: 1px solid white;
            border-radius: 25px;
            color: white;
            box-shadow: 15px 10px 25px rgba(216, 215, 215, 0.755);
            background:transparent;
            backdrop-filter: blur(15px);
        }
        h2 {
            margin-bottom: 20px;
            text-align: center;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 25px;
            box-sizing: border-box;
            background: transparent;
            color: aliceblue;
        }
        input::placeholder{
            color: white;
        }
        .btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            width: 100%;
            border-radius: 25px;
            font-size: 16px;
        }
        .btn:hover {
            background-color: #45a049;
        }
        .message {
            margin-top: 10px;
            color: #e53935;
            min-height: 18px;
        }
        .message.success {
            color: #4CAF50;
        }
        .link {
            margin-top: 10px;
            text-align: center;
        }
        .link a{
            color: rgb(240, 130, 231);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Sign Up</h2>
        <form id="signupForm" onsubmit="return signup(event)">
            <div class="input-group">
                <label for="newUsername">Username:</label>
                <input type="text" id="newUsername" placeholder="Enter your username" required autocomplete="username">
            </div>
            <div class="input-group">
                <label for="newPassword">Password:</label>
                <input type="password" id="newPassword" placeholder="Enter your password" required autocomplete="new-password">
            </div>
            <button type="submit" class="btn">Sign Up</button>
        </form>
        <div id="message" class="message" aria-live="polite"></div>
        <div class="link">
            <a href="login.html">Login if account exists</a>
        </div>
    </div>

    <script>
        /**
         * Escapes HTML special characters to prevent XSS in user messages.
         * @param {string} str
         * @returns {string}
         */
        function sanitize(str) {
            const div = document.createElement('div');
            div.textContent = String(str);
            return div.innerHTML;
        }

        /**
         * Handles signup form submission.
         * Performs basic validation and saves new user to localStorage.
         * Note: Do NOT store passwords in localStorage in production!
         * @param {Event} event
         * @returns {boolean}
         */
        function signup(event) {
            event.preventDefault(); // Prevent the form from submitting normally

            const messageElem = document.getElementById('message');
            messageElem.classList.remove('success');
            let error = '';

            const username = document.getElementById('newUsername').value.trim();
            const password = document.getElementById('newPassword').value.trim();

            // Defensive: Ensure username and password are strings
            if (typeof username !== 'string' || typeof password !== 'string') {
                error = 'Invalid input.';
            } else if (username === '' || password === '') {
                error = 'Please fill in all fields.';
            }

            if (error) {
                messageElem.innerHTML = sanitize(error);
                return false;
            }

            // Retrieve users from localStorage, ensuring array structure
            let users = [];
            try {
                const stored = localStorage.getItem('users');
                if (stored) {
                    users = JSON.parse(stored);
                    if (!Array.isArray(users)) users = [];
                }
            } catch (e) {
                users = [];
            }

            // Check if the username already exists (case-sensitive)
            if (users.some(user => user.username === username)) {
                messageElem.innerHTML = sanitize('Username already taken.');
                return false;
            }

            // Add new user to the users array
            users.push({ username, password });
            try {
                localStorage.setItem('users', JSON.stringify(users));
            } catch (e) {
                messageElem.innerHTML = sanitize('Failed to save user. Please try again.');
                return false;
            }

            // Provide feedback & redirect
            messageElem.textContent = '';
            messageElem.classList.add('success');
            messageElem.innerHTML = sanitize('Signup successful! Redirecting to login...');
            setTimeout(function() {
                window.location.href = 'login.html';
            }, 1000);
            return false;
        }
    </script>
</body>
</html>
