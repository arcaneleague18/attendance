<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="icon" type="image/png" href="punisher.png">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 110vh;
            margin: 0;
            background-image: url("spiders.jpg");
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            transition: background-color 0.3s, background-image 0.3s;
        }
        .container {
            width: 300px;
            padding: 20px;
            border: 1px solid white;
            border-radius: 25px;
            color: white;
            box-shadow: 15px 10px 25px rgba(216, 215, 215, 0.755);
            background:transparent;
            backdrop-filter: blur(15px);
        }
        h2 {
            margin-bottom: 20px;
            text-align: center;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 25px;
            box-sizing: border-box;
            background: transparent;
            color: aliceblue;
        }
        input::placeholder{
            color: white;
        }
        .btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            width: 100%;
            border-radius: 25px;
            font-size: 16px;
        }
        .btn:hover {
            background-color: #45a049;
        }
        .message {
            margin-top: 10px;
            color: #e53935;
        }
        .link {
            margin-top: 10px;
            text-align: center;
        }
        .link a{
            color: rgb(240, 130, 231);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Sign Up</h2>
        <form id="signupForm" onsubmit="return signup(event)">
            <div class="input-group">
                <label for="newUsername">Username:</label>
                <input type="text" id="newUsername" placeholder="Enter your username" required autocomplete="off" autocapitalize="off" spellcheck="false">
            </div>
            <div class="input-group">
                <label for="newPassword">Password:</label>
                <input type="password" id="newPassword" placeholder="Enter your password" required autocomplete="off">
            </div>
            <button type="submit" class="btn">Sign Up</button>
        </form>
        <div id="message" class="message" aria-live="polite"></div>
        <div class="link">
            <a href="login.html">Login if account exists</a>
        </div>
    </div>

    <script>
        /**
         * Sanitizes a string for safe DOM insertion to prevent XSS attacks.
         * @param {string} text - The text to sanitize.
         * @returns {string} Sanitized HTML string.
         */
        function sanitize(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        /**
         * Handles sign-up form submission. Validates input, checks for duplicate usernames,
         * and saves user data to localStorage. Displays sanitized messages.
         * @param {Event} event - The form submit event.
         * @returns {boolean} false to prevent default submit
         */
        function signup(event) {
            event.preventDefault(); // Prevent the form from submitting normally

            const usernameElem = document.getElementById('newUsername');
            const passwordElem = document.getElementById('newPassword');
            const messageElem = document.getElementById('message');
            if (!usernameElem || !passwordElem || !messageElem) return false;

            let username = usernameElem.value.trim();
            let password = passwordElem.value.trim();

            // Sanitize user input (but do not allow empty or whitespace-only values)
            if (username === '' || password === '') {
                messageElem.textContent = 'Please fill in all fields.';
                return false;
            }

            // Defensive: Limit username and password length
            if (username.length > 64 || password.length > 128) {
                messageElem.textContent = 'Username or password too long.';
                return false;
            }

            // Retrieve users from localStorage
            let users = [];
            try {
                const usersStr = localStorage.getItem('users');
                if (usersStr) {
                    users = JSON.parse(usersStr);
                    if (!Array.isArray(users)) users = [];
                }
            } catch (e) {
                users = [];
            }

            // Check if the username already exists (case sensitive)
            if (users.some(user => user.username === username)) {
                messageElem.textContent = 'Username already taken.';
                return false;
            }

            // Add new user and store
            users.push({
                username: username,
                password: password // SECURITY: Do NOT store plain text passwords in production!
            });
            try {
                localStorage.setItem('users', JSON.stringify(users));
            } catch (e) {
                messageElem.textContent = 'Unable to save user. Please try again.';
                return false;
            }

            // Optionally give user feedback before redirect
            // messageElem.textContent = 'Registration successful! Redirecting...';
            window.location.href = 'login.html';
            return false;
        }
    </script>
</body>
</html>
